<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Multi-Recorder App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #1e1e1e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    button.launch {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background-color: #0078d4;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button.launch:hover {
      background-color: #005a9e;
    }
    select.mode-selector {
      padding: 12px;
      font-size: 16px;
      margin-right: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #2d2d2d;
      color: #fff;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
    .dashboard {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 250px;
      border-right: 1px solid #333;
      background-color: #252526;
      overflow-y: auto;
    }
    .sidebar h3 {
      margin: 0;
      padding: 15px;
      font-size: 14px;
      text-transform: uppercase;
      color: #ccc;
      border-bottom: 1px solid #333;
    }
    .file-item {
      padding: 10px 15px;
      cursor: pointer;
      border-bottom: 1px solid #333;
      font-size: 14px;
      word-break: break-all;
    }
    .file-item:hover {
      background-color: #37373d;
    }
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: #1e1e1e;
    }
    .editor-header {
      padding: 10px 20px;
      background-color: #2d2d2d;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 14px;
    }
    pre {
      margin: 0;
      padding: 20px;
      overflow: auto;
      flex: 1;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: #d4d4d4;
    }
    .mt-15 { margin-top: 15px; }
    .mt-20 { margin-top: 20px; }
    .skills-lib-container { padding: 10px; border-bottom: 1px solid #333; }
    .pdf-upload-label { cursor: pointer; display: inline-block; padding: 8px 12px; background: #333; border-radius: 4px; border: 1px solid #555; font-size: 13px; color: #fff; width: calc(100% - 24px); text-align: center; }
    .pdf-upload-status { margin-top: 10px; font-size: 12px; color: #aaa; text-align: center; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Multi-Recorder Dashboard</h1>
    <div class="mt-15">
      <select id="modeSelect" class="mode-selector" title="Mode Selector">
        <option value="all" selected>All Extensions (Run All at Once)</option>
        <option value="playwright-trace">Playwright Trace Mode</option>
        <option value="rover">Rover Preview Mode</option>
        <option value="bugbug">Bugbug Cloud Mode</option>
        <option value="form-recorder">Form Recorder Mode</option>
      </select>
      <button id="launchBtn" class="launch">Launch Browser</button>
    </div>
    <div id="status">Ready</div>
  </header>
  
  <div class="dashboard">
    <div class="sidebar">
      <h3>Desktop/MyRecords</h3>
      <div id="fileList"></div>
      
      <h3 class="mt-20">Skills Library</h3>
      <div class="skills-lib-container">
        <label class="pdf-upload-label">
          📄 Convert PDF to CSV
          <input type="file" id="pdfUploadInput" accept=".pdf" multiple hidden />
        </label>
        <div id="pdfUploadStatus" class="pdf-upload-status"></div>
      </div>
      <div id="skillsList"></div>
    </div>
    <div class="editor-pane">
      <div class="editor-header" id="editorTitle">Select a file</div>
      <pre id="editorContent"></pre>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
