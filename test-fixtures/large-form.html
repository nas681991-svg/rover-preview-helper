<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Large Form Test Fixture (50 Fields)</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; background: #1a1a2e; color: #e0e0e0; }
    h1 { color: #00d4ff; }
    h2 { color: #e94560; margin-top: 24px; }
    .form-section { background: #16213e; padding: 16px 20px; border-radius: 8px; margin: 12px 0; }
    .form-row { display: flex; flex-wrap: wrap; gap: 16px; margin: 8px 0; }
    .form-group { flex: 1 1 280px; min-width: 200px; }
    label { font-weight: 600; color: #a8dadc; display: block; margin-bottom: 4px; font-size: 13px; }
    input, select, textarea {
      display: block; width: 100%; padding: 8px 10px; box-sizing: border-box;
      background: #0f3460; border: 1px solid #533483; color: #e0e0e0;
      border-radius: 4px; font-size: 14px;
    }
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
    .checkbox-group input { width: auto; }
    button {
      margin-top: 16px; padding: 10px 28px;
      background: #e94560; color: white; border: none; border-radius: 4px;
      font-size: 14px; cursor: pointer; font-weight: 600;
    }
    #field-count { color: #533483; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Large Form (50 Fields)</h1>
  <p id="field-count">Total input fields: 50</p>

  <form id="large-form" autocomplete="off">
    <!-- Section 1: Personal Info (fields 1-10) -->
    <div class="form-section">
      <h2>Personal Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="field-1">First Name</label>
          <input type="text" id="field-1" name="firstName" aria-label="First Name">
        </div>
        <div class="form-group">
          <label for="field-2">Last Name</label>
          <input type="text" id="field-2" name="lastName" aria-label="Last Name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-3">Email</label>
          <input type="email" id="field-3" name="email" aria-label="Email">
        </div>
        <div class="form-group">
          <label for="field-4">Phone</label>
          <input type="tel" id="field-4" name="phone" aria-label="Phone">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-5">Date of Birth</label>
          <input type="date" id="field-5" name="dob" aria-label="Date of Birth">
        </div>
        <div class="form-group">
          <label for="field-6">Gender</label>
          <select id="field-6" name="gender" aria-label="Gender">
            <option value="">-- Select --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer-not">Prefer not to say</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-7">Nationality</label>
          <input type="text" id="field-7" name="nationality" aria-label="Nationality">
        </div>
        <div class="form-group">
          <label for="field-8">Occupation</label>
          <input type="text" id="field-8" name="occupation" aria-label="Occupation">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-9">Company</label>
          <input type="text" id="field-9" name="company" aria-label="Company">
        </div>
        <div class="form-group">
          <label for="field-10">Title</label>
          <input type="text" id="field-10" name="title" aria-label="Title">
        </div>
      </div>
    </div>

    <!-- Section 2: Address (fields 11-20) -->
    <div class="form-section">
      <h2>Address</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="field-11">Street Address</label>
          <input type="text" id="field-11" name="street" aria-label="Street Address">
        </div>
        <div class="form-group">
          <label for="field-12">Apartment / Suite</label>
          <input type="text" id="field-12" name="apt" aria-label="Apartment">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-13">City</label>
          <input type="text" id="field-13" name="city" aria-label="City">
        </div>
        <div class="form-group">
          <label for="field-14">State / Province</label>
          <input type="text" id="field-14" name="state" aria-label="State">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-15">Zip / Postal Code</label>
          <input type="text" id="field-15" name="zip" aria-label="Zip Code">
        </div>
        <div class="form-group">
          <label for="field-16">Country</label>
          <select id="field-16" name="country" aria-label="Country">
            <option value="">-- Select --</option>
            <option value="us">United States</option>
            <option value="ca">Canada</option>
            <option value="uk">United Kingdom</option>
            <option value="au">Australia</option>
            <option value="de">Germany</option>
            <option value="fr">France</option>
            <option value="jp">Japan</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-17">County</label>
          <input type="text" id="field-17" name="county" aria-label="County">
        </div>
        <div class="form-group">
          <label for="field-18">Region</label>
          <input type="text" id="field-18" name="region" aria-label="Region">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-19">Landmark</label>
          <input type="text" id="field-19" name="landmark" aria-label="Landmark">
        </div>
        <div class="form-group">
          <label for="field-20">Address Type</label>
          <select id="field-20" name="addressType" aria-label="Address Type">
            <option value="">-- Select --</option>
            <option value="residential">Residential</option>
            <option value="commercial">Commercial</option>
            <option value="po-box">P.O. Box</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Section 3: Employment (fields 21-30) -->
    <div class="form-section">
      <h2>Employment</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="field-21">Employer Name</label>
          <input type="text" id="field-21" name="employerName" aria-label="Employer Name">
        </div>
        <div class="form-group">
          <label for="field-22">Job Title</label>
          <input type="text" id="field-22" name="jobTitle" aria-label="Job Title">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-23">Department</label>
          <input type="text" id="field-23" name="department" aria-label="Department">
        </div>
        <div class="form-group">
          <label for="field-24">Work Email</label>
          <input type="email" id="field-24" name="workEmail" aria-label="Work Email">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-25">Work Phone</label>
          <input type="tel" id="field-25" name="workPhone" aria-label="Work Phone">
        </div>
        <div class="form-group">
          <label for="field-26">Start Date</label>
          <input type="date" id="field-26" name="startDate" aria-label="Start Date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-27">Annual Salary</label>
          <input type="number" id="field-27" name="salary" aria-label="Annual Salary">
        </div>
        <div class="form-group">
          <label for="field-28">Employment Type</label>
          <select id="field-28" name="employmentType" aria-label="Employment Type">
            <option value="">-- Select --</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="freelance">Freelance</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-29">Supervisor Name</label>
          <input type="text" id="field-29" name="supervisor" aria-label="Supervisor Name">
        </div>
        <div class="form-group">
          <label for="field-30">Office Location</label>
          <input type="text" id="field-30" name="office" aria-label="Office Location">
        </div>
      </div>
    </div>

    <!-- Section 4: Education (fields 31-38) -->
    <div class="form-section">
      <h2>Education</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="field-31">University</label>
          <input type="text" id="field-31" name="university" aria-label="University">
        </div>
        <div class="form-group">
          <label for="field-32">Degree</label>
          <select id="field-32" name="degree" aria-label="Degree">
            <option value="">-- Select --</option>
            <option value="bachelor">Bachelor's</option>
            <option value="master">Master's</option>
            <option value="phd">Ph.D.</option>
            <option value="associate">Associate's</option>
            <option value="diploma">Diploma</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-33">Major</label>
          <input type="text" id="field-33" name="major" aria-label="Major">
        </div>
        <div class="form-group">
          <label for="field-34">Graduation Year</label>
          <input type="number" id="field-34" name="gradYear" aria-label="Graduation Year">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-35">GPA</label>
          <input type="text" id="field-35" name="gpa" aria-label="GPA">
        </div>
        <div class="form-group">
          <label for="field-36">Honors</label>
          <input type="text" id="field-36" name="honors" aria-label="Honors">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-37">Certifications</label>
          <input type="text" id="field-37" name="certifications" aria-label="Certifications">
        </div>
        <div class="form-group">
          <label for="field-38">Languages</label>
          <input type="text" id="field-38" name="languages" aria-label="Languages">
        </div>
      </div>
    </div>

    <!-- Section 5: Additional (fields 39-48) -->
    <div class="form-section">
      <h2>Additional Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="field-39">Emergency Contact Name</label>
          <input type="text" id="field-39" name="emergencyName" aria-label="Emergency Contact Name">
        </div>
        <div class="form-group">
          <label for="field-40">Emergency Contact Phone</label>
          <input type="tel" id="field-40" name="emergencyPhone" aria-label="Emergency Contact Phone">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-41">Blood Type</label>
          <select id="field-41" name="bloodType" aria-label="Blood Type">
            <option value="">-- Select --</option>
            <option value="a+">A+</option>
            <option value="a-">A-</option>
            <option value="b+">B+</option>
            <option value="b-">B-</option>
            <option value="o+">O+</option>
            <option value="o-">O-</option>
            <option value="ab+">AB+</option>
            <option value="ab-">AB-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="field-42">Allergies</label>
          <input type="text" id="field-42" name="allergies" aria-label="Allergies">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-43">SSN / Tax ID</label>
          <input type="text" id="field-43" name="taxId" aria-label="SSN Tax ID">
        </div>
        <div class="form-group">
          <label for="field-44">Passport Number</label>
          <input type="text" id="field-44" name="passport" aria-label="Passport Number">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-45">Driver License</label>
          <input type="text" id="field-45" name="driverLicense" aria-label="Driver License">
        </div>
        <div class="form-group">
          <label for="field-46">Insurance Provider</label>
          <input type="text" id="field-46" name="insuranceProvider" aria-label="Insurance Provider">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="field-47">Insurance Policy #</label>
          <input type="text" id="field-47" name="insurancePolicy" aria-label="Insurance Policy Number">
        </div>
        <div class="form-group">
          <label for="field-48">Preferred Contact Method</label>
          <select id="field-48" name="contactMethod" aria-label="Preferred Contact Method">
            <option value="">-- Select --</option>
            <option value="email">Email</option>
            <option value="phone">Phone</option>
            <option value="sms">SMS</option>
            <option value="mail">Postal Mail</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Section 6: Consent (fields 49-50) -->
    <div class="form-section">
      <h2>Consent</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="field-49" name="termsAccepted" aria-label="Accept Terms">
        <label for="field-49">I accept the terms and conditions</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="field-50" name="marketingOptIn" aria-label="Marketing Opt In">
        <label for="field-50">I agree to receive marketing communications</label>
      </div>

      <button type="button" id="submit-all" onclick="validateAll()">Submit</button>
    </div>
  </form>

  <div id="result" style="display:none; margin-top: 20px; background: #0d4b2c; padding: 16px; border-radius: 8px;">
    <h2 style="color: #4ade80;">Form Submitted Successfully</h2>
    <pre id="result-json" style="color: #d1fae5; font-size: 12px; white-space: pre-wrap;"></pre>
  </div>

  <script>
    function validateAll() {
      const form = document.getElementById('large-form');
      const inputs = form.querySelectorAll('input, select, textarea');
      const data = {};
      inputs.forEach(el => {
        if (el.type === 'checkbox') {
          data[el.name] = el.checked;
        } else {
          data[el.name] = el.value;
        }
      });
      document.getElementById('result').style.display = 'block';
      document.getElementById('result-json').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
